
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sébastien AI - Vexel World</title>
    <style>
        /* إعدادات لتنظيف الصفحة ومنع التمرير */
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            overflow: hidden; 
            background-color: #000; 
        }

        /* شريط العودة الاحترافي */
        .back-bar { 
            background: #000; 
            padding: 12px; 
            border-bottom: 1px solid #ff8c00; 
            text-align: center; 
            position: relative;
            z-index: 999;
        }
        .back-bar a { 
            color: #ff8c00; 
            text-decoration: none; 
            font-weight: bold; 
            font-family: sans-serif;
            font-size: 14px;
        }

        /* حاوية الخدعة لإخفاء شعار المنصة */
        .app-container {
            position: absolute;
            top: 45px; 
            left: 0;
            right: 0;
            bottom: 0;
            overflow: hidden;
        }

        iframe {
            width: 100%;
            height: calc(100% + 70px); 
            margin-top: -65px; /* لسحب شريط Sekai للأعلى وإخفائه */
            border: none;
        }
    </style>
</head>
<body>

    <div class="back-bar">
        <a href="index.html">← العودة لإمبراطورية VEXEL</a>
    </div>

    <div class="app-container">
        <iframe src="https://link.prod.sekai.chat/8aQIhd"></iframe>
    </div>

</body>
