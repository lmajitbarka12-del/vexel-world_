<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sébastien AI - Vexel World</title>
    <style>
        /* إعدادات لتنظيف الشاشة ومنع التمرير الخارجي */
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            overflow: hidden; 
            background-color: #000; 
        }

        /* شريط العودة الاحترافي لـ VEXEL */
        .back-bar { 
            background: #000; 
            padding: 12px; 
            border-bottom: 1px solid #ff8c00; 
            text-align: center; 
            position: relative;
            z-index: 999;
        }
        .back-bar a { 
            color: #ff8c00; 
            text-decoration: none; 
            font-weight: bold; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 14px;
            letter-spacing: 1px;
        }

        /* حاوية الخدعة لسحب التطبيق للأعلى وإخفاء شعار المنصة */
        .app-container {
            position: absolute;
            top: 45px; /* مساحة شريط العودة */
            left: 0;
            right: 0;
            bottom: 0;
            overflow: hidden;
        }

        iframe {
            width: 100%;
            height: calc(100% + 70px); /* تعويض الطول المفقود بسبب السحب */
            margin-top: -65px; /* الخدعة: سحب الجزء العلوي المزعج للأعلى */
            border: none;
        }
    </style>
</head>
<body>

    <div class="back-bar">
        <a href="index.html">← العودة لإمبراطورية VEXEL</a>
    </div>

    <div class="app-container">
        <iframe src="https://link.prod.sekai.chat/GTwo3B"></iframe>
    </div>

</body>
</html>
