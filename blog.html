<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VEXEL AI - نظام اللورد زكريا</title>
    <style>
        body { background-color: #05080a; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .container { background: #0b1219; border: 2px solid #00d2ff; padding: 40px; border-radius: 25px; box-shadow: 0 0 30px rgba(0, 210, 255, 0.3); width: 90%; max-width: 500px; text-align: center; }
        h1 { color: #00d2ff; text-shadow: 0 0 10px #00d2ff; font-size: 2.5rem; margin-bottom: 10px; }
        .status { color: #00ff88; font-size: 0.9rem; margin-bottom: 25px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .status::before { content: ""; width: 8px; height: 8px; background: #00ff88; border-radius: 50%; box-shadow: 0 0 10px #00ff88; }
        input { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #333; background: #05080a; color: white; font-size: 1rem; box-sizing: border-box; outline: none; margin-bottom: 20px; }
        .btn-ai { background: #00d2ff; color: #05080a; border: none; padding: 15px 30px; border-radius: 12px; font-weight: bold; font-size: 1.1rem; cursor: pointer; width: 100%; transition: 0.3s; }
        .btn-ai:hover { background: #0088aa; transform: scale(1.02); }
        .back-link { display: block; margin-top: 25px; color: #888; text-decoration: none; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="container">
        <h1>VEXEL AI</h1>
        <div class="status">النظام متصل وجاهز للعمل</div>
        
        <p style="color: #ccc; margin-bottom: 20px;">مرحباً بك في بوابة الذكاء الاصطناعي. أدخل سؤالك أو طلبك البرمجي أدناه:</p>

        <input type="text" placeholder="اكتب سؤالك هنا يا لورد...">

        <button class="btn-ai" onclick="alert('جاري معالجة الطلب في نظام VEXEL...')">إرسال الطلب</button>

        <a href="index.html" class="back-link">← العودة للوحة التحكم الرئيسية</a>
    </div>

</body>
</html>
