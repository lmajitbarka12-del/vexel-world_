<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VEXEL X PRO</title>
    <style>
        /* شاشة بيضاء نظيفة جداً */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #ffffff;
            font-family: sans-serif;
        }

        /* حاوية التطبيق */
        .app-wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        /* إطار تشغيل التطبيق */
        iframe {
            flex: 1;
            width: 100%;
            border: none;
        }

        /* شريط التنقل السفلي الذي طلبته (يبقى ثابتاً ولا يختفي) */
        .nav-bar {
            height: 60px;
            background: #ffffff;
            border-top: 1px solid #eeeeee;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 9999;
        }

        .nav-item {
            text-decoration: none;
            color: #888;
            font-size: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .nav-item.active { color: #007bff; }
        .dot { width: 10px; height: 10px; background: #ddd; border-radius: 50%; margin-bottom: 5px; }
        .active .dot { background: #007bff; }
    </style>
</head>
<body>

    <div class="app-wrapper">
        <iframe src="https://link.prod.sekai.chat/0OOy5x" allowfullscreen></iframe>

        <nav class="nav-bar">
            <a href="#" class="nav-item active">
                <div class="dot"></div>
                <span>الرئيسية</span>
            </a>
            <a href="#" class="nav-item">
                <div class="dot"></div>
                <span>البحث</span>
            </a>
            <a href="#" class="nav-item">
                <div class="dot"></div>
                <span>الملف</span>
            </a>
        </nav>
    </div>

</body>
</html>
