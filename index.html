<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VEXEL X PRO</title>
    <style>
        /* إعدادات الشاشة البيضاء والنظيفة */
        body { 
            background-color: #ffffff; 
            color: #333333; 
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .main-card {
            background: #ffffff;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            border: 1px solid #f0f0f0;
            max-width: 400px;
            width: 90%;
        }

        .logo-box {
            width: 70px;
            height: 70px;
            background: #007bff;
            color: white;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            font-weight: bold;
            margin: 0 auto 20px;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 10px;
            color: #000;
        }

        p {
            font-size: 16px;
            color: #777;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .btn {
            display: inline-block;
            background: #007bff;
            color: #ffffff;
            padding: 14px 40px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 50px;
            transition: 0.3s;
        }

        .btn:hover {
            background: #0056b3;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 123, 255, 0.3);
        }
    </style>
</head>
<body>

    <div class="main-card">
        <div class="logo-box">VX</div>
        <h1>VEXEL X PRO</h1>
        <p>مرحباً بكم في المنصة الرسمية لـ VEXEL X. اضغط على الزر أدناه للدخول إلى نظامك السحابي المتطور.</p>
        
        <a href="https://link.prod.sekai.chat/0OOy5x" class="btn">دخول التطبيق</a>
    </div>

</body>
</html>
